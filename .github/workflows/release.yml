name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build binaries
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, windows]
        goarch: [amd64]
        include:
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - uses: actions/checkout@v6
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.23"
      - name: Build and package
        run: |
          EXT=""
          if [ "${{ matrix.goos }}" = "windows" ]; then
            EXT=".exe"
          fi
          BINARY="tskoans${EXT}"
          ARCHIVE="tskoans-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz"
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} CGO_ENABLED=0 go build -o "$BINARY"
          tar -czf "$ARCHIVE" "$BINARY"
      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: binaries-${{ matrix.goos }}-${{ matrix.goarch }}
          path: tskoans-*.tar.gz

  release:
    name: Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: binaries-*
          path: .
      - name: Move archives to root
        run: |
          find . -type f -name "tskoans-*.tar.gz" -exec mv {} . \;
      - uses: ncipollo/release-action@v1
        with:
          artifacts: "tskoans-*.tar.gz"
          token: ${{ secrets.GITHUB_TOKEN }}

  npm-publish:
    name: Publish to npm
    needs: release
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v6
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
      - name: Set package version from tag
        working-directory: npm
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Publishing ts-koans@${VERSION}"
          npm version "$VERSION" --no-git-tag-version --allow-same-version
      - name: Publish
        working-directory: npm
        env:
          # Don't try to download the binary during `npm publish`'s own
          # install step.
          TSKOANS_SKIP_DOWNLOAD: "1"
        run: npm publish --access public
